name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install SurvStudio with dev dependencies
        run: pip install -e ".[dev]"

      - name: CLI smoke test
        shell: bash
        run: |
          cat > /tmp/survstudio_smoke.csv <<'EOF'
          os_months,os_event,age
          12,1,60
          18,0,55
          EOF
          survival-toolkit inspect /tmp/survstudio_smoke.csv > /tmp/survstudio_profile.json
          test -s /tmp/survstudio_profile.json

      - name: Run test suite
        run: pytest -q
